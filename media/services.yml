services:
  torrent: # Port : 8080
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${TORRENT_UID}
      - PGID=${GID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - ${DOWNLOADS_PATH}:/downloads
      - ${HOST_PATH}/qbittorrent:/config
    ports:
      - 6881:6881 # BtTorrent port

  flaresolverr: # For Prowlarr, set to "http://flaresolverr:8191"
    image: flaresolverr/flaresolverr:v3.4.6
    restart: unless-stopped
    networks:
      - services
    dns:
      - 1.1.1.1
      - 1.0.0.1

  qui:
    image: ghcr.io/autobrr/qui:v1.17.0
    restart: unless-stopped
    networks:
      - global_net
      - services
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.qui.entrypoints=https'
      - 'traefik.http.services.qui.loadbalancer.server.port=7476'
    volumes:
      - ${HOST_PATH}/qui:/config
      - ${DOWNLOADS_PATH}:/downloads
    environment:
      QUI__OIDC_ENABLED: true
      QUI__OIDC_ISSUER: https://id.thetoto.fr
      QUI__OIDC_CLIENT_ID: ${QUI_OIDC_CLIENT_ID}
      QUI__OIDC_CLIENT_SECRET: ${QUI_OIDC_CLIENT_SECRET}
      QUI__OIDC_REDIRECT_URL: https://qui.media.thetoto.fr/api/auth/oidc/callback
      QUI__OIDC_DISABLE_BUILT_IN_LOGIN: true

  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.76.0
    restart: unless-stopped
    user: ${TORRENT_UID}:${GID}
    volumes:
      - ${HOST_PATH}/autobrr:/config
    networks:
      - global_net
      - services
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.autobrr.entrypoints=https'
      - 'traefik.http.services.autobrr.loadbalancer.server.port=7474'
    environment:
      TZ: ${TZ}
      AUTOBRR__OIDC_ENABLED: true
      AUTOBRR__OIDC_ISSUER: https://id.thetoto.fr
      AUTOBRR__OIDC_CLIENT_ID: ${AUTOBRR_OIDC_CLIENT_ID}
      AUTOBRR__OIDC_CLIENT_SECRET: ${AUTOBRR_OIDC_CLIENT_SECRET}
      AUTOBRR__OIDC_REDIRECT_URL: https://autobrr.media.thetoto.fr/api/auth/oidc/callback
      AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN: true

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:nightly-version-2.3.2.5270
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${HOST_PATH}/prowlarr:/config
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prowlarr.entrypoints=https'
      - 'traefik.http.services.prowlarr.loadbalancer.server.port=9696'
      - 'traefik.http.routers.prowlarr.middlewares=gate'
      - 'tinyauth.apps.prowlarr.path.allow=^/api(/.*|$$)'

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${HOST_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.sonarr.entrypoints=https'
      - 'traefik.http.services.sonarr.loadbalancer.server.port=8989'
      - 'traefik.http.routers.sonarr.middlewares=gate'
      - 'tinyauth.apps.sonarr.path.allow=^/api(/.*|$$)'

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${HOST_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.radarr.entrypoints=https'
      - 'traefik.http.services.radarr.loadbalancer.server.port=7878'
      - 'traefik.http.routers.radarr.middlewares=gate'
      - 'tinyauth.apps.radarr.path.allow=^/api(/.*|$$)'

  sonarr4k:
    image: lscr.io/linuxserver/sonarr:4.0.17
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${HOST_PATH}/sonarr4k:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.sonarr4k.entrypoints=https'
      - 'traefik.http.services.sonarr4k.loadbalancer.server.port=8989'
      - 'traefik.http.routers.sonarr4k.middlewares=gate'
      - 'tinyauth.apps.sonarr4k.path.allow=^/api(/.*|$$)'

  radarr4k:
    image: lscr.io/linuxserver/radarr:6.1.1
    restart: unless-stopped
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${HOST_PATH}/radarr4k:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOADS_PATH}:/downloads
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.radarr4k.entrypoints=https'
      - 'traefik.http.services.radarr4k.loadbalancer.server.port=7878'
      - 'traefik.http.routers.radarr4k.middlewares=gate'
      - 'tinyauth.apps.radarr4k.path.allow=^/api(/.*|$$)'

  overseerr: # Seerr instance for Plex
    image: ghcr.io/seerr-team/seerr:v3.2.0
    init: true
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${HOST_PATH}/overseerr:/app/config
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.overseerr.loadbalancer.server.port=5055'
      - 'traefik.http.routers.overseerr.entrypoints=https'

  jellyseerr: # Seerr instance for Jellyfin
    image: ghcr.io/seerr-team/seerr:v3.2.0
    init: true
    networks:
      - global_net
      - services
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${HOST_PATH}/jellyseerr:/app/config
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.jellyseerr.loadbalancer.server.port=5055'
      - 'traefik.http.routers.jellyseerr.entrypoints=https'

networks:
  services:
  global_net:
    external: true












